<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">

    <title>Pokémon Preposition Master - 100Q Edition</title>
    <style>
        body { font-family: sans-serif; background: #888888; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* 寶可夢跳動動畫 */
        @keyframes bobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 4px); } 50% { transform: translate(8px, -4px); } 75% { transform: translate(-8px, -4px); } }
        .damage-flash { background-color: #5c1616 !important; }
        .heal-flash { background-color: #4caf50 !important; }
        .shake-effect { animation: shake 0.12s linear 3; }
        
        #game-box { width: 90%; max-width: 380px; background: #fff; border-radius: 20px; padding: 20px; border: 6px solid #3c5aa6; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .hp-bar { flex-grow: 1; height: 16px; background: #eee; border: 2px solid #333; border-radius: 12px; overflow: hidden; margin: 0 10px; }
        #hp-fill { width: 100%; height: 100%; background: #4caf50; transition: width 0.4s; }
        .combo-badge { font-size: 0.75em; background: #ffcb05; padding: 4px 10px; border-radius: 10px; font-weight: bold; color: #3c5aa6; border: 2px solid #3c5aa6; }
        
        #stage { height: 160px; display: flex; justify-content: center; align-items: center; margin: 15px 0; background: #f0f0f0; border-radius: 15px; border: 3px solid #bbb; }
        
        /* 應用跳動動畫 */
        #pokemon-img { 
            width: 120px; 
            height: 120px; 
            image-rendering: pixelated; 
            animation: bobbing 1.2s ease-in-out infinite; 
        }
        
        .catch-anim { transform: scale(0) rotate(720deg) !important; opacity: 0; transition: 0.5s; animation: none !important; }
        
        #question { font-size: 1em; min-height: 65px; color: #2a75bb; font-weight: bold; margin: 10px 0; display: flex; align-items: center; justify-content: center; padding: 0 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border-radius: 10px; border: 2.5px solid #3c5aa6; background: #fff; cursor: pointer; font-size: 1em; font-weight: bold; color: #3c5aa6; box-shadow: 0 4px 0 #3c5aa6; }
        button:active { transform: translateY(3px); box-shadow: none; }
        #msg { height: 25px; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; color: #444; }
    </style>
</head>

    </div>

    <div id="stage"><img id="pokemon-img" src="" alt="Pokemon"></div>
    <div id="msg">目標出現了！</div>
    <div id="question"></div>

    let quizData = [...questions].sort(() => Math.random() - 0.5);
    let hp = 100, current = 0, combo = 0;

    function loadQuestion() {
        if (hp <= 0 || current >= quizData.length) { endGame(hp > 0); return; }
        const data = quizData[current];
        document.getElementById('question').innerText = data.q;
        document.getElementById('progress').innerText = current + 1;
        document.getElementById('msg').innerText = "野生寶可夢出現了！";
        
        const img = document.getElementById('pokemon-img');
        const randomId = Math.floor(Math.random() * 151) + 1;
        
        // --- 使用反引號確保變數解析 ---
        img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${randomId}.png`;
        
        img.classList.remove('catch-anim');
        const btnGroup = document.getElementById('btn-group');
        btnGroup.innerHTML = '';
        const shuffled = [...data.a].sort(() => Math.random() - 0.5);
        shuffled.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, data.c);
            btnGroup.appendChild(btn);
        });
    }

    function checkAnswer(picked, correct) {
        if (picked === correct) {
            combo++; current++;
            document.getElementById('msg').innerText = "成功收服！";
            document.getElementById('pokemon-img').classList.add('catch-anim');
            document.body.classList.add('heal-flash');
            setTimeout(() => { document.body.classList.remove('heal-flash'); loadQuestion(); }, 600);
        } else {
            hp -= 20; combo = 0;
            document.getElementById('msg').innerText = "受到攻擊！";
            document.body.classList.add('damage-flash');
            document.getElementById('game-box').classList.add('shake-effect');
            updateUI();
            if (hp <= 0) setTimeout(() => endGame(false), 500);
            else setTimeout(() => {
                document.body.classList.remove('damage-flash');
                document.getElementById('game-box').classList.remove('shake-effect');
            }, 400);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('hp-fill').style.width = hp + "%";
        document.getElementById('combo-count').innerText = combo;
    }

    function endGame(win) {
        document.getElementById('game-box').innerHTML = `<h2>${win ? 'CLEAR!' : 'GAME OVER'}</h2><p>收服: ${current} / 100</p><button onclick="location.reload()" style="width:100%; padding:15px; margin-top:10px;">RETRY</button>`;
    }

    updateUI(); loadQuestion();
